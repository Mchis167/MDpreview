<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwitchToggle Preview - MDpreview</title>
    
    <!-- Link to tokens for colors and spacing -->
    <link rel="stylesheet" href="../css/tokens.css">
    <link rel="stylesheet" href="../css/switch-toggle.css">
    
    <style>
        body {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            background: #111; /* Dark demo background */
            font-family: 'Inter', sans-serif;
            color: #ccc;
        }
        
        .preview-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .section-label {
            min-width: 150px;
            font-size: 14px;
            opacity: 0.7;
        }
        
        .log-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            color: var(--accent-orange, #ffbf48);
            margin-top: 16px;
            border-radius: 8px;
            max-width: 300px;
        }

        h2 { font-size: 18px; margin-bottom: 8px; color: #fff; }
    </style>
</head>
<body>

    <div>
        <h2>SwitchToggle Showcase</h2>
        <p style="font-size: 13px; opacity: 0.5;">Premium standalone component logic</p>
    </div>

    <!-- Case 1: Active Off -->
    <div class="preview-section">
        <div class="section-label">Normal (OFF)</div>
        <div id="toggle-1" class="switch-toggle" tabindex="0">
            <div class="switch-indicator"></div>
        </div>
    </div>

    <!-- Case 2: Active On -->
    <div class="preview-section">
        <div class="section-label">Normal (ON)</div>
        <div id="toggle-2" class="switch-toggle" tabindex="0">
            <div class="switch-indicator"></div>
        </div>
    </div>

    <!-- Case 3: Disabled -->
    <div class="preview-section">
        <div class="section-label">Disabled (OFF)</div>
        <div id="toggle-3" class="switch-toggle" tabindex="0">
            <div class="switch-indicator"></div>
        </div>
    </div>

    <div class="preview-section">
        <div class="section-label">Disabled (ON)</div>
        <div id="toggle-4" class="switch-toggle" tabindex="0">
            <div class="switch-indicator"></div>
        </div>
    </div>

    <!-- Case 4: Callback -->
    <div class="preview-section">
        <div class="section-label">Event Handling</div>
        <div id="toggle-event"></div>
    </div>

    <div id="log" class="log-box">Status: Ready</div>

    <!-- Scripts -->
    <script src="../js/switch-toggle.js"></script>
    <script>
        const log = document.getElementById('log');

        // Logic Initialization
        SwitchToggleModule.init({ containerId: 'toggle-1', isOn: false });
        SwitchToggleModule.init({ containerId: 'toggle-2', isOn: true });
        SwitchToggleModule.init({ containerId: 'toggle-3', isOn: false, disabled: true });
        SwitchToggleModule.init({ containerId: 'toggle-4', isOn: true, disabled: true });

        // Event Handling Demo
        SwitchToggleModule.init({ 
            containerId: 'toggle-event', 
            isOn: false, 
            onChange: (state) => {
                log.textContent = `Status: ${state ? 'ON' : 'OFF'}`;
                log.style.opacity = state ? 1 : 0.6;
            }
        });
    </script>
</body>
</html>
