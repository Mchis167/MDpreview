<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Component Preview</title>
    <!-- We bundle the combined CSS for the preview -->
    <style>
        /* Tokens approximation */
        :root {
            --accent-green: #22c55e;
            --layer-modal: #111;
            --border-sidebar: rgba(255, 255, 255, 0.08);
            --radius-lg: 16px;
            --text-40: rgba(255, 255, 255, 0.4);
            --accent-color: #f97316; /* Example accent */
        }

        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .preview-card {
            background: #111;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5rem; margin-bottom: 8px; font-weight: 600; }
        p { color: #888; margin-bottom: 24px; font-size: 0.9rem; }

        button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* ── Toast Notification Styles (from modals.css) ────────── */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(20px);
        }

        .toast-container.show {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .toast-content {
            background: var(--layer-modal);
            border: 1px solid var(--border-sidebar);
            border-radius: var(--radius-lg);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            min-width: 240px;
        }

        .toast-icon {
            width: 16px;
            height: 16px;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast-message {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-green);
            flex: 1;
        }

        .toast-close {
            width: 16px;
            height: 16px;
            color: var(--text-40);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: color 0.2s;
        }

        .toast-close:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="preview-card">
        <h1>Toast Component</h1>
        <p>Previewing the top-right notification design (Figma Spec).</p>
        <button onclick="showToast('Copied 2 comments')">Trigger Toast</button>
    </div>

    <script>
        function showToast(message) {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                container.innerHTML = `
                <div class="toast-content">
                    <div class="toast-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
                    </div>
                    <div class="toast-message"></div>
                    <div class="toast-close" onclick="this.closest('.toast-container').classList.remove('show')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </div>
                </div>
                `;
                document.body.appendChild(container);
            }
            
            container.querySelector('.toast-message').textContent = message;
            
            if (container._timer) clearTimeout(container._timer);
            
            container.classList.add('show');
            
            container._timer = setTimeout(() => {
                container.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
