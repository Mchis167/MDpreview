<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Toolbar Preview</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/toolbar.css">
  <link rel="stylesheet" href="../css/modals.css">
  <link rel="stylesheet" href="../css/editor.css">

  <style>
    body {
      background: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .preview-container {
      flex: 1;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mock-editor-frame {
      width: 100%;
      height: 600px;
      max-width: 900px;
      background: var(--glass-main);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-main);
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .mock-header {
        height: 56px;
        border-bottom: 1px solid var(--border-main);
        display: flex;
        align-items: center;
        padding-left: 24px;
        font-family: 'Roboto Mono', monospace;
        font-size: 10px;
        color: var(--text-20);
        letter-spacing: 0.1em;
    }

    /* Override for standalone preview */
    #edit-viewer {
        display: flex !important;
    }
  </style>
</head>
<body>

  <div class="preview-container">
    <div class="mock-editor-frame">
      <div class="mock-header">EDITOR MODE — PROJECT_GUIDES.MD</div>
      
      <div id="edit-viewer" style="flex: 1; position: relative;">
        <textarea id="edit-textarea" placeholder="Start writing something beautiful..."># Getting Started with MDpreview

MDpreview allows you to preview your local markdown files in real-time with a premium, design-first experience.

## Features
* **Hot Reload**: Changes are reflected instantly.
* **Mermaid Support**: Render beautiful diagrams directly.
* **AI Assistance**: Get insights and suggestions for your docs.

Try selecting this text and using the toolbar below!</textarea>
        
        <div class="edit-toolbar-container">
          <div class="edit-toolbar">
            <!-- Action Group 1 -->
            <div class="edit-action-group">
              <div class="edit-tool-btn" data-action="h" title="Heading">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12h12"/><path d="M6 20V4"/><path d="M18 20V4"/></svg>
              </div>
              <div class="edit-tool-btn" data-action="b" title="Bold">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 12a4 4 0 0 0 0-8H6v8"/><path d="M15 20a4 4 0 0 0 0-8H6v8"/></svg>
              </div>
              <div class="edit-tool-btn" data-action="q" title="Quote">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 6H3"/><path d="M21 12H8"/><path d="M21 18H8"/><path d="M3 12v6"/></svg>
              </div>
              <div class="edit-tool-btn" data-action="c" title="Code">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              </div>
              <div class="edit-tool-btn" data-action="l" title="Link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              </div>
            </div>

            <div class="edit-divider"></div>

            <!-- Action Group 2 -->
            <div class="edit-action-group">
              <div class="edit-tool-btn" data-action="ul" title="Unordered List">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
              </div>
              <div class="edit-tool-btn" data-action="ol" title="Numbered List">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
              </div>
              <div class="edit-tool-btn" data-action="tl" title="Task List">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
              </div>
            </div>

            <div class="edit-divider"></div>

            <!-- Final Action Group -->
            <div class="edit-button-group">
              <button class="btn-ghost" id="edit-cancel-btn">Cancel</button>
              <button class="btn-primary-pill" id="edit-save-btn">Save</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/editor.js"></script>
  <script>
    // Stub global state for preview
    const AppState = {
        currentFile: 'preview.md'
    };

    function showToast(msg) {
        console.log('Toast:', msg);
        alert(msg);
    }
  </script>
</body>
</html>
